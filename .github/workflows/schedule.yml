name: EMA/MACD 每小时定时检测

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ema-macd-check:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write    # ← 新增这一行
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas
      
      - name: 运行 EMA/MACD 检测
        run: python send.py
      
      - name: 提交状态文件
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add btc_ema_state.json || true
          git commit -m "auto: 更新 EMA/MACD 检测状态" || true
          git push origin main || true    # ← 修改这一行，明确指定分支
